name: Deploy Color Palette

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: |
          pnpm build:color_palette_gen
          pnpm build:builder_day

      - name: Prepare Pages structure
        run: |
          mkdir -p deploy/color_palette_gen
          mkdir -p deploy/builder_day
          cp index.html deploy/
          cp -r apps/colors/drafts/color_palette_gen/dist/* deploy/color_palette_gen/
          cp -r apps/builder_day/dist/* deploy/builder_day/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: deploy
