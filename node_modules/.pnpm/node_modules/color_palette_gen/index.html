<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<title>Color Palette Generator</title>
		<link
			rel="shortcut icon"
			href="./assets/favicon.svg"
			type="image/x-icon"
		/>
		<link
			rel="stylesheet"
			href="./node_modules/@maxmov/css/reset.css"
		/>
		<link
			rel="stylesheet"
			href="./css/app.css"
		/>
		<link
			rel="stylesheet"
			href="./css/header.css"
		/>
		<link
			rel="stylesheet"
			href="./css/main.css"
		/>
		<link
			rel="stylesheet"
			href="./css/footer.css"
		/>
	</head>
	<body>
		<div class="app">
			<header class="header">
				<h1>Немного о цвете и цветовых сочетаниях...</h1>
				<h3></h3>
				<p>
					Двигая ползунки выберите базовый цвет. Затем нажмите кнопку "Готово!".
				</p>
			</header>
			<main class="main">
				<!-- <div class="main_flip_card_container"> -->
				<!-- <div class="main_flip_card"></div> -->
				<flippin-card id="flippin-card_id">
					<div slot="front">
						<section class="sliders">
							<div class="slider slider_red">
								<div class="slider_label_wrapper">
									<span>R</span>
									<span class="slider_label slider_label_red"> </span>
								</div>
								<input
									type="range"
									id="slider_red_id"
									min="0"
									max="255"
									value="0"
									step="1"
								/>
								<span
									class="slider_value"
									id="value_red_id"
									>0</span
								>
							</div>
							<div class="slider slider_green">
								<div class="slider_label_wrapper">
									<span>G</span>
									<span class="slider_label slider_label_green"></span>
								</div>
								<input
									type="range"
									id="slider_green_id"
									min="0"
									max="255"
									value="125"
									step="1"
								/>
								<span
									class="slider_value"
									id="value_green_id"
									>125</span
								>
							</div>
							<div class="slider slider_blue">
								<div class="slider_label_wrapper">
									<span>B</span>
									<span class="slider_label slider_label_blue"></span>
								</div>
								<input
									type="range"
									id="slider_blue_id"
									min="0"
									max="255"
									value="255"
									step="1"
								/>
								<span
									class="slider_value"
									id="value_blue_id"
									>255</span
								>
							</div>
						</section>
						<button id="front_btn_id">Готово!</button>
					</div>
					<div slot="back">
						<section class="main_back">here will be palettes...</section>
						<button id="back_btn_id">Готово!</button>
					</div>
				</flippin-card>
				<!-- </div> -->
			</main>
			<footer class="footer">
				<p class="copyright">
					<span> 2026 © WebDev </span>
					<!-- <a href="#"> -->
					<span>
						<img
							src="./node_modules/@maxmov/assets/icons/wa.svg"
							alt="whatsapp icon"
						/>
						sms
					</span>
					<span> +7(926)604-66-41 </span>
					<!-- </a> -->
				</p>
			</footer>
		</div>
	</body>
	<script
		type="module"
		src="./js/app.js"
	></script>
</html>
