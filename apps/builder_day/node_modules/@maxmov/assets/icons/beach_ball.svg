<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="ball">
      <circle cx="32" cy="32" r="30"></circle>
    </clipPath>
  </defs>

  <!-- Base yellow -->
  <circle cx="32" cy="32" r="30" fill="#FFD54A"></circle>

  <!-- Blue curved panels -->
  <g clip-path="url(#ball)">
    
    <path d="M-10 22 
             C10 5, 35 5, 60 22
             C50 28, 30 28, 10 22
             C5 20, -5 20, -10 22 Z" fill="#2D6CDF"></path>

    <path d="M4 46
             C24 30, 46 30, 70 46
             L70 70
             L4 70 Z" fill="#2D6CDF"></path>

  </g>

  <!-- White separators -->
  <path d="M6 24 
           C20 12, 44 12, 58 24" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"></path>

  <path d="M10 42 
           C26 54, 42 54, 56 42" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"></path>

  <path d="M22 6 
           C36 26, 36 38, 22 58" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"></path>

  <!-- Light highlight -->
  <ellipse cx="24" cy="18" rx="9" ry="5" fill="white" opacity="0.18"></ellipse>

  <!-- Outer border -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="white" stroke-width="2"></circle>
</svg>